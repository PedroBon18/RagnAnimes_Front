<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detalhes do Anime</title>
  <link rel="stylesheet" href="detalhes.css" />
</head>
<body>
  <header>
    <h1>RagnAnimes</h1>
    <a href="index.html" class="back-link">← Voltar</a>
  </header>

  <main class="container">
    <div class="anime-details">
      <img id="imagem" src="" alt="Imagem do anime" />
      <div class="info">
        <h2 id="titulo"></h2>
        <p id="descricao"></p>
      </div>
    </div>

    <section id="trailer-section" class="trailer-section" style="display:none;">
      <h2>Trailer</h2>
      <iframe
        id="trailer"
        width="560"
        height="315"
        src=""
        title="Trailer do anime"
        frameborder="0"
        allowfullscreen
      ></iframe>
    </section>

    <section id="error-section" style="display:none;">
      <h2>Anime não encontrado</h2>
      <p>O anime que você está procurando não existe ou foi removido.</p>
    </section>
  </main>

  <script>
    const animes = [
      {
        id: 1,
        nome: "Boku no Hero",
        descricao:"Em um mundo onde a maioria da população possui superpoderes chamados Quirks, um garoto sem poderes chamado Izuku Midoriya sonha em se tornar um herói e recebe a chance quando o maior herói de todos os tempos compartilha seu poder com ele.",
        imagem: "/img/acao/MHA.jpg",
        trailer: "https://www.youtube.com/embed/lP9XKEMMpmQ",
      },
      {
        id: 2,
        nome: "Solo Leveling",
        descricao: "Em um mundo onde caçadores enfrentam monstros mortais, o caçador mais fraco, Sung Jin-Woo, ganha uma habilidade misteriosa de evoluir sem limites após sobreviver a uma masmorra mortal.",
        imagem: "/img/acao/sololeviling.jpg",
        trailer: "https://www.youtube.com/embed/YvGSK8mIlt8",
      },
      {
        id: 3,
        nome: "Jujutusu Kaisen",
        descricao:"Yuji Itadori, um estudante do ensino médio com habilidades físicas extraordinárias, se envolve no mundo das maldições após engolir um poderoso objeto amaldiçoado e precisa lutar contra criaturas perigosas ao lado de feiticeiros.",
        imagem: "/img/acao/jujutusu_kaisen_2.jpg",
        trailer: "https://www.youtube.com/embed/pkKu9hLT-t8",
      },
      {
        id: 4,
        nome: "Yu Yu Hakusho",

        trailer: "https://www.youtube.com/embed/bGc1Na8mlw0"
      },
      {
        id: 5,
        nome: "Naruto",
        descricao: "Naruto Uzumaki, um jovem ninja com uma raposa demoníaca selada dentro dele, sonha em se tornar Hokage e ganhar o respeito de sua vila enquanto enfrenta diversos inimigos e desafios.",
        imagem: "/img/acao/naruto.jpg",
        trailer: "https://www.youtube.com/embed/-G9BqkgZXRA"
      },
      {
        id: 6,
        nome: "Naruto Shippuden",
        descricao: "Naruto retorna à sua vila após anos de treinamento, determinado a resgatar seu amigo Sasuke e proteger o mundo de inimigos poderosos que ameaçam a paz.",
        imagem:"/img/acao/naruto_shipuuden.jpg",
        trailer: "https://www.youtube.com/embed/t6q3e76SNhs"
      },
      {
        id: 7,
        nome: "Black Clover",
        descricao: "Em um mundo mágico, dois órfãos, Asta e Yuno, competem para se tornar o Rei Mago, mas Asta não tem magia e precisa contar com sua determinação e uma misteriosa espada anti-magia.",
        imagem:"/img/acao/black_clover.jpg",
        trailer: "https://www.youtube.com/embed/QwNWY6z93O4"
      },
      { id: 8, 
        nome: "Boku no Hero Vigilantes", 
        descricao: "Koichi Haimawari desistiu do sonho de ser herói, mas vive em uma sociedade onde 80% das pessoas possuem poderes chamados Individualidades. Ele acaba envolvido em ações heroicas inesperadas.", 
        imagem:"/img/acao/MHA_Vigilante.jpg",
        trailer: "https://www.youtube.com/embed/tU092KyDmco"
      },
      {
        id: 9,
        nome: "Demon Slayer",
        descricao: "Tanjiro Kamado, um garoto bondoso, se torna um caçador de demônios depois que sua família é massacrada por demônios e sua irmã Nezuko é transformada em um deles.",
        imagem:"/img/acao/kimetsu.jpg",
        trailer: "https://www.youtube.com/embed/VQGCKyvzIM4"
      },
       { id: 10, 
        nome: "Dan Da Dan",
        descricao: "Momo Ayase acredita em fantasmas, enquanto Ken Takakura é obcecado por alienígenas. Juntos, eles se envolvem em eventos sobrenaturais cômicos e emocionantes.", 
        imagem:"/img/acao/DanDaDan.jpg",
        trailer: "https://www.youtube.com/embed/0XJxfbN36Uw",
      },
      {
        id: 11,
        nome: "Chainsaw Man",
        descricao: "Denji, um jovem pobre com uma dívida a pagar, se funde com seu demônio de estimação Pochita para se tornar Chainsaw Man e caça demônios para sobreviver.",
        imagem:"/img/acao/chainsaw.jpg",
        trailer: "https://www.youtube.com/embed/j9sSzNmB5po"
      },
      { 
        id: 12, 
        nome: "Mashle: Magic and Muscles", 
        descricao: "Em um mundo mágico, Mash Burnedead, nascido sem magia, tem como objetivo se tornar um Visionário Divino confiando apenas em sua imensa força física.",
        imagem:"/img/acao/mashle.jpg",
        trailer: "https://www.youtube.com/embed/hZz9O7Gk6Eg"
      },
      { 
        id: 13, 
        nome: "Tokyo Revengers", 
        descricao: "Takemichi Hanagaki descobre que pode viajar no tempo e tenta salvar sua ex-namorada e amigos mudando o curso de sua vida.",
        imagem:"/img/acao/tokyo_revengers.jpg",
        trailer: "https://www.youtube.com/embed/4lJzEemVtjg"
      },
      { 
        id: 14, 
        nome: "Fullmetal Alchemist: Brotherhood", 
        descricao: "Os irmãos Edward e Alphonse Elric usam alquimia para tentar reviver sua mãe, mas a tentativa fracassada lhes custa caro, levando-os em uma jornada para restaurar seus corpos.",
        imagem:"/img/acao/FMAB.jpg",
        trailer: "https://www.youtube.com/embed/dMGxkAxhOi8"
      },
      {
        id: 15,
        nome: "Dragon Ball Z",
        descricao:"Goku e seus amigos defendem a Terra de inimigos poderosos, que vão desde guerreiros intergalácticos até androides quase imparáveis e criaturas mágicas.",
        imagem: "/img/acao/DBZ.jpg",
        trailer: "https://www.youtube.com/embed/n0gQnmYpK4M",
      },
    ];

    // Pega o id da URL
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get("id"));

    // Busca o anime
    const anime = animes.find((a) => a.id === id);

    // Referências aos elementos do DOM
    const imgElem = document.getElementById("imagem");
    const tituloElem = document.getElementById("titulo");
    const descricaoElem = document.getElementById("descricao");
    const trailerSection = document.getElementById("trailer-section");
    const trailerIframe = document.getElementById("trailer");
    const errorSection = document.getElementById("error-section");
    const animeDetailsDiv = document.querySelector(".anime-details");

    if (anime) {
      imgElem.src = anime.imagem;
      imgElem.alt = anime.nome;
      tituloElem.textContent = anime.nome;
      descricaoElem.textContent = anime.descricao;
      trailerIframe.src = anime.trailer;
      trailerIframe.title = `Trailer de ${anime.nome}`;

      trailerSection.style.display = "block";
      errorSection.style.display = "none";
      animeDetailsDiv.style.display = "flex";
    } else {
      trailerSection.style.display = "none";
      errorSection.style.display = "block";
      animeDetailsDiv.style.display = "none";
    }
  </script>
</body>
</html>
