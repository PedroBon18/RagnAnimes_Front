<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
      <div class="form-box">
        <h2>Cadastro</h2>
        <form>
          <input type="text" placeholder="Nome" required>
          <input type="email" placeholder="E-mail" required>

        </form>
        <div class="links">
          <a href="#">Já tenho uma conta</a>
        </div>
  </div>
</body>
